<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frontend A — Panel by Fylyp</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/shared.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/prevod.css') }}">
</head>
<body>
<canvas id="sakura-canvas"></canvas>
<div class="app-shell">

  <!-- Sidebar -->
  <aside class="sidebar">
    <a href="/" class="sidebar-logo">
      <div class="sidebar-logo-icon">F</div>
      <div>
        <div class="sidebar-logo-text">Panel by Fylyp</div>
        <div class="sidebar-logo-sub">IoT Dashboard</div>
      </div>
    </a>
    <nav class="sidebar-nav">
      <span class="nav-label">Frontend</span>
      <a href="/"       class="nav-link active">Frontend A</a>
      <a href="/klient" class="nav-link">Frontend B</a>
    </nav>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="page-header">
      <h1>Frontend A</h1>
    </div>

    <!-- ── Section: Calculator ── -->
    <div class="section-title"></div>
    <div class="grid-2" style="margin-bottom: 28px;">
      <div class="card">
        <div class="card-title">Vstup</div>
        <div class="calc-display">
          <div class="calc-expr" id="calc-expr"></div>
          <div class="calc-val" id="calc-display">0</div>
        </div>
        <div class="calc-btns">
          <button class="cb cb-light" onclick="calcPress('AC')">AC</button>
          <button class="cb cb-light" onclick="calcPress('+/-')">+/&minus;</button>
          <button class="cb cb-light" onclick="calcPress('%')">%</button>
          <button class="cb cb-accent" onclick="calcPress('deleno')">&divide;</button>

          <button class="cb cb-light" onclick="calcPress('7')">7</button>
          <button class="cb cb-light" onclick="calcPress('8')">8</button>
          <button class="cb cb-light" onclick="calcPress('9')">9</button>
          <button class="cb cb-accent" onclick="calcPress('krat')">&times;</button>

          <button class="cb cb-light" onclick="calcPress('4')">4</button>
          <button class="cb cb-light" onclick="calcPress('5')">5</button>
          <button class="cb cb-light" onclick="calcPress('6')">6</button>
          <button class="cb cb-accent" onclick="calcPress('minus')">&minus;</button>

          <button class="cb cb-light" onclick="calcPress('1')">1</button>
          <button class="cb cb-light" onclick="calcPress('2')">2</button>
          <button class="cb cb-light" onclick="calcPress('3')">3</button>
          <button class="cb cb-accent" onclick="calcPress('plus')">+</button>

          <button class="cb cb-light span-2" onclick="calcPress('0')">0</button>
          <button class="cb cb-light" onclick="calcPress('.')">.</button>
          <button class="cb cb-primary" onclick="calcPress('=')">=</button>
        </div>
        <div class="calc-status" id="calc-status"></div>
      </div>

      <div class="card">
        <div class="card-title">Vysledok</div>
        <div class="result-big" id="result-big">—</div>
        <div class="result-label" id="result-label">Zatial ziadny vypocet</div>
      </div>
    </div>

    <!-- ── Section: Unit Converter ── -->
    <div class="section-title">Prevodnik jednotiek</div>
    <div class="grid-2">
      <div class="card card-accent">
        <div class="card-title">Vstup</div>
        <form id="prevod-form">
          <div class="form-group">
            <label for="prevod-typ">Typ prevodu</label>
            <select id="prevod-typ" class="select-styled" onchange="selectType(this.value)">
              <option value="c_to_f">&deg;C &rarr; &deg;F (Teplota)</option>
              <option value="hpa_to_mmhg">hPa &rarr; mmHg (Tlak)</option>
              <option value="ms_to_kmh">m/s &rarr; km/h (Rychlost)</option>
            </select>
          </div>
          <div class="form-group">
            <label>Hodnota</label>
            <input type="number" id="prevod-hodnota" class="input-big" placeholder="0" step="any" required>
            <div class="unit-label" id="input-unit">&deg;C</div>
          </div>
          <button type="submit" class="btn btn-primary">Previest</button>
        </form>
        <div class="error-msg" id="prevod-error"></div>
        <div class="result-card" id="prevod-result">
          <div class="res-label">Vysledok</div>
          <div class="res-value" id="res-value">—</div>
          <div class="res-desc"  id="res-desc"></div>
        </div>
      </div>

      <!-- Number system converter -->
      <div class="card">
        <div class="card-title">Numeracne sustavy — DEC / BIN / OCT / HEX</div>
        <div class="form-group" style="margin-bottom:10px;">
          <label>Zdrojova sustava</label>
          <div class="base-btns">
            <button class="base-btn" data-base="10" onclick="selectBase(10)">DEC <span style="opacity:.6;font-size:.7rem;">10</span></button>
            <button class="base-btn" data-base="2"  onclick="selectBase(2)">BIN <span style="opacity:.6;font-size:.7rem;">2</span></button>
            <button class="base-btn" data-base="8"  onclick="selectBase(8)">OCT <span style="opacity:.6;font-size:.7rem;">8</span></button>
            <button class="base-btn" data-base="16" onclick="selectBase(16)">HEX <span style="opacity:.6;font-size:.7rem;">16</span></button>
          </div>
        </div>
        <div class="form-group">
          <label>Hodnota <span id="sys-hint" style="color:var(--text-muted); font-weight:400;">(desiatkov)</span></label>
          <input type="text" id="sys-input" class="input-big" placeholder="0" autocomplete="off" oninput="convertSystems()">
        </div>
        <div class="sys-error" id="sys-error"></div>
        <div class="sys-grid">
          <div class="sys-box" id="sys-dec"><div class="sys-label">DEC</div><div class="sys-value" id="val-dec">—</div><div class="sys-base">zaklad 10</div></div>
          <div class="sys-box" id="sys-bin"><div class="sys-label">BIN</div><div class="sys-value" id="val-bin">—</div><div class="sys-base">zaklad 2</div></div>
          <div class="sys-box" id="sys-oct"><div class="sys-label">OCT</div><div class="sys-value" id="val-oct">—</div><div class="sys-base">zaklad 8</div></div>
          <div class="sys-box" id="sys-hex"><div class="sys-label">HEX</div><div class="sys-value" id="val-hex">—</div><div class="sys-base">zaklad 16</div></div>
        </div>
      </div>
    </div>

  </main>
</div>
<script src="{{ url_for('static', filename='js/admin.js') }}"></script>
<script src="{{ url_for('static', filename='js/prevod.js') }}"></script>
<script src="{{ url_for('static', filename='js/sakura.js') }}"></script>
</body>
</html>
