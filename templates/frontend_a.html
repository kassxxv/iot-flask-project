<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kalkulačka — IoT Dashboard</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/shared.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body>
<div class="app-shell">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <a href="/" class="sidebar-logo">
      <div class="sidebar-logo-icon">📡</div>
      <span class="sidebar-logo-text">IoT Panel</span>
    </a>
    <nav class="sidebar-nav">
      <span class="nav-label">Nástroje</span>
      <a href="/"       class="nav-link active"><span class="icon">🧮</span> Kalkulačka</a>
      <a href="/prevod" class="nav-link"><span class="icon">🔄</span> Prevodník</a>
      <span class="nav-label">Monitoring</span>
      <a href="/klient" class="nav-link"><span class="icon">📊</span> Dashboard</a>
    </nav>
  </aside>

  <!-- ── Main ── -->
  <main class="main">
    <div class="page-header">
      <h1>Kalkulačka</h1>
      <p>Vykonajte základné aritmetické operácie — výsledky sa ukladajú do databázy.</p>
    </div>

    <div class="grid-2">
      <!-- Calculator card -->
      <div class="card">
        <div class="card-title">🧮 Vstup</div>
        <div class="calc-display">
          <div class="calc-expr" id="calc-expr"></div>
          <div class="calc-val" id="calc-display">0</div>
        </div>
        <div class="calc-btns">
          <button class="cb cb-light" onclick="calcPress('AC')">AC</button>
          <button class="cb cb-light" onclick="calcPress('+/-')">+/−</button>
          <button class="cb cb-light" onclick="calcPress('%')">%</button>
          <button class="cb cb-accent" onclick="calcPress('deleno')">÷</button>

          <button class="cb cb-light" onclick="calcPress('7')">7</button>
          <button class="cb cb-light" onclick="calcPress('8')">8</button>
          <button class="cb cb-light" onclick="calcPress('9')">9</button>
          <button class="cb cb-accent" onclick="calcPress('krat')">×</button>

          <button class="cb cb-light" onclick="calcPress('4')">4</button>
          <button class="cb cb-light" onclick="calcPress('5')">5</button>
          <button class="cb cb-light" onclick="calcPress('6')">6</button>
          <button class="cb cb-accent" onclick="calcPress('minus')">−</button>

          <button class="cb cb-light" onclick="calcPress('1')">1</button>
          <button class="cb cb-light" onclick="calcPress('2')">2</button>
          <button class="cb cb-light" onclick="calcPress('3')">3</button>
          <button class="cb cb-accent" onclick="calcPress('plus')">+</button>

          <button class="cb cb-light span-2" onclick="calcPress('0')">0</button>
          <button class="cb cb-light" onclick="calcPress('.')">.</button>
          <button class="cb cb-primary" onclick="calcPress('=')">=</button>
        </div>
        <div class="calc-status" id="calc-status"></div>
      </div>

      <!-- Result + history card -->
      <div class="card">
        <div class="card-title">🎯 Výsledok</div>
        <div class="result-big" id="result-big">—</div>
        <div class="result-label" id="result-label">Zatiaľ žiadny výpočet</div>

        <div class="card-title" style="margin-top: 24px;">📜 Posledné výpočty</div>
        <div id="history-list">
          <div class="empty loading">Načítavam…</div>
        </div>
      </div>
    </div>
  </main>

</div>
<script src="{{ url_for('static', filename='js/admin.js') }}"></script>
</body>
</html>
