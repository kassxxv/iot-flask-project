<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <link rel="stylesheet" href="/static/css/calculator.css" />
</head>
<body>
  <div class="wrapper">
    <h1>Calculator</h1>
    <div class="calc">
      <div class="display">
        <div id="expression" class="expression"></div>
        <div id="screen" class="screen">0</div>
      </div>
      <div class="buttons">
        <button class="btn clear span2" onclick="clearAll()">C</button>
        <button class="btn op" data-op="/">&divide;</button>
        <button class="btn op" data-op="*">&times;</button>

        <button class="btn num" data-val="7">7</button>
        <button class="btn num" data-val="8">8</button>
        <button class="btn num" data-val="9">9</button>
        <button class="btn op" data-op="-">&minus;</button>

        <button class="btn num" data-val="4">4</button>
        <button class="btn num" data-val="5">5</button>
        <button class="btn num" data-val="6">6</button>
        <button class="btn op" data-op="+">+</button>

        <button class="btn num" data-val="1">1</button>
        <button class="btn num" data-val="2">2</button>
        <button class="btn num" data-val="3">3</button>
        <button class="btn equals span1r2" onclick="calculate()">=</button>

        <button class="btn num span2" data-val="0">0</button>
        <button class="btn num" data-val=".">.</button>
      </div>
    </div>
    <a href="/history" class="history-link">View History &rarr;</a>
  </div>
  <script src="/static/js/calculator.js"></script>
</body>
</html>
