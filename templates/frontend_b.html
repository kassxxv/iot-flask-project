<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Client Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <header>
        <h1>IoT Client Dashboard</h1>
        <p>Frontend B — Monitoring a história v reálnom čase</p>
    </header>

    <div class="dashboard-grid">
        <!-- LAST CALCULATION CARD -->
        <div class="card">
            <div class="card-title">🎯 Posledný výpočet</div>
            <div id="last-calc" style="text-align: center; padding: 1rem;">
                <div class="calc-val" id="last-calc-val" style="color: var(--accent-primary);">—</div>
                <div id="last-calc-expr" style="color: var(--text-muted); margin-top: 0.5rem;">Čakám na dáta...</div>
            </div>
        </div>

        <!-- STATUS CARD -->
        <div class="card">
            <div class="card-title">📡 Stav systému</div>
            <div style="display: flex; flex-direction: column; gap: 1rem;">
                <div style="display: flex; justify-content: space-between;">
                    <span style="color: var(--text-muted);">Backend:</span>
                    <span id="status-backend" class="badge badge-blue">Pripájanie...</span>
                </div>
                <div style="display: flex; justify-content: space-between;">
                    <span style="color: var(--text-muted);">Posledný refresh:</span>
                    <span id="status-refresh" style="font-family: monospace;">—</span>
                </div>
            </div>
        </div>
    </div>

    <!-- HISTORY TABLES -->
    <div class="dashboard-grid" style="margin-top: 2rem;">
        <div class="card">
            <div class="card-title">📜 História výpočtov</div>
            <div class="table-container" id="table-vypocty">
                <p style="color: var(--text-muted); text-align: center; padding: 1rem;">Načítavam...</p>
            </div>
        </div>

        <div class="card">
            <div class="card-title">🔄 História prevodov</div>
            <div class="table-container" id="table-prevody">
                <p style="color: var(--text-muted); text-align: center; padding: 1rem;">Načítavam...</p>
            </div>
        </div>
    </div>
</div>

<script src="/static/js/client.js"></script>

</body>
</html>
